name: publish-dashboard

# Regenerate the public dashboard from the canonical chain and publish it to
# GitHub Pages whenever main advances. This keeps https://<user>.github.io/qlabcoin/
# in sync with the public clock without a manual push.

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions: write to the gh-pages branch (contents) only.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build CLI
        run: go build -o bin/qlabcoin ./cmd/qlabcoin

      # The canonical chain is the source of truth. This also doubles as a
      # check: if verify-chain fails (tampered links, bad signature, or an
      # unverifiable recorded solution) the dashboard does not get published.
      - name: Verify canonical chain
        run: ./bin/qlabcoin verify-chain -chain qlabcoin-canonical-chain.json

      - name: Regenerate dashboard
        run: ./bin/qlabcoin dashboard -html -out index.html -chain qlabcoin-canonical-chain.json

      # Publish: force-push index.html as the only file on gh-pages.
      - name: Publish to gh-pages
        run: |
          cd "$(mktemp -d)"
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp "$GITHUB_WORKSPACE/index.html" .
          git add index.html
          git commit -q -m "Publish dashboard from ${GITHUB_SHA::7}"
          git push -q -f "https://${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
